name: Public Mirror Secret Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check forbidden tracked paths
        run: |
          set -euo pipefail
          matches="$(git ls-files | grep -E '(^\.env$|^\.env\.|(^|/)\.vercel/|(^|/)logs/|(^|/)scratch/|(^|/)notuploadgithub/|^src/generated_v2/|^src/generated/|(^|/)node_modules/|(^|/)\.next/|(^|/)\.agents/|(^|/)\.claude/|^src/app/admin/|^src/app/api/admin/)' | grep -v '^\.env\.example$' || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "Forbidden files are tracked in the public mirror."
            exit 1
          fi

      - name: Scan for high-confidence secret patterns
        run: |
          set -euo pipefail
          pattern='(admin0724|superadmin0724|BEGIN (RSA|PRIVATE)|AIza[0-9A-Za-z_-]{20,}|postgres(ql)?://[^\s"'"'"']+|ghp_[A-Za-z0-9_]+|sk-[A-Za-z0-9]{20,})'
          matches="$(grep -RInE --exclude-dir=.git --exclude=package-lock.json --exclude=secret-scan.yml "$pattern" . | grep -v 'postgresql://user:password@hostname:5432/db_name' || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "Secret-like values found."
            exit 1
          fi
